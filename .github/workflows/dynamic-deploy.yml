name: Build and Deploy Web Dinamis (Next.js & DB)

on:
  push:
    paths:
      - 'Web-Dinamis/**'
      - 'db/**'
      - 'docker-compose.yml'
      - 'nginx.conf'
      - '.github/workflows/dynamic-deploy.yml'
    branches:
      - main
      - master

jobs:
  build-and-push:
    name: Build Docker Image & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Next.js Application
        uses: docker/build-push-action@v4
        with:
          context: ./Web-Dinamis
          file: ./Web-Dinamis/Dockerfile
          push: true
          tags: kakangwildan/uas-2388010053-wildan:latest
          cache-from: type=registry,ref=kakangwildan/uas-2388010053-wildan:buildcache
          cache-to: type=registry,ref=kakangwildan/uas-2388010053-wildan:buildcache,mode=max

  deploy:
    name: Pull Image and Restart Containers on EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Copy docker-compose, configs, and SQL scripts to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf,db/init.sql"
          target: "~/uas-server"

      - name: Execute Pull & Restart on EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/uas-server
            cd ~/uas-server
            
            # Log in to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "kakangwildan" --password-stdin
            
            # Pull latest pre-built images
            docker compose pull
            
            # Restart modified containers with minimum downtime
            docker compose up -d --remove-orphans
            
            # Clean up old unused images
            docker image prune -f
